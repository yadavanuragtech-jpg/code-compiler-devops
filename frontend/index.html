<!DOCTYPE html>
<html>
<head>
  <title>Online Code Compiler</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    #editor {
      width: 100%; height: 250px;
      border: 2px solid black;
      padding: 10px; font-size: 16px;
    }
    #output-box {
      width: 100%; border: 2px solid green;
      padding: 10px; height: 150px; white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h2>🔥 Multi-Language Online Code Compiler</h2>

<select id="language">
  <option value="python">Python</option>
</select>

<textarea id="editor">print("Hello Compiler!")</textarea>
<br><br>

<button onclick="runCode()">Run Code</button>

<br><br>
<h3>Output:</h3>
<div id="output-box"></div>

<script>
async function runCode() {
  const code = document.getElementById("editor").value;
  const outputBox = document.getElementById("output-box");

  outputBox.innerText = "Running...";

  try {
    const response = await fetch("https://code-compiler-devops.onrender.com/run", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code })
    });

    const data = await response.json();

    outputBox.innerText =
      "OUTPUT:\n" + (data.output || "") + "\n\nERROR:\n" + (data.error || "");
  } catch (err) {
    outputBox.innerText = "Request failed:\n" + err.message;
  }
}
</script>

</body>
</html>
